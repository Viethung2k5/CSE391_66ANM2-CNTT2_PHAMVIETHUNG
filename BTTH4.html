<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTTH 4 - Sticky Header</title>
    <link rel="stylesheet" href="BTTH4.css">
</head>
<body>

    <!-- HEADER STICKY -->
    <header id="main-header" class="sticky-header">
        <h1>My Blog</h1>
        <p>Flexbox, Grid & Responsive</p>
    </header>

    <!-- MENU -->
    <nav>
        <a href="#">Trang chủ</a>
        <a href="#">Giới thiệu</a>
        <a href="#">Bài viết</a>
        <a href="#">Liên hệ</a>
    </nav>

    <main>

        <!-- POSTS (FLEXBOX) -->
        <section class="posts">

            <article class="card">
                <h3>Bài viết 1</h3>
                <p>Mô tả ngắn về bài viết 1.</p>
                <a href="#" class="btn">Đọc thêm</a>
            </article>
            
            <article class="card">
                <h3>Bài viết 2</h3>
                <p>Mô tả ngắn về bài viết 2.</p>
                <a href="#" class="btn">Đọc thêm</a>
            </article>
            
            <article class="card">
                <h3>Bài viết 3</h3>
                <p>Mô tả ngắn về bài viết 3.</p>
                <a href="#" class="btn">Đọc thêm</a>
            </article>

        </section>

        <!-- GALLERY (GRID) -->
        <section class="gallery">
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
            <div class="item">4</div>
            <div class="item">5</div>
            <div class="item">6</div>
        </section>

    </main>

    <!-- SCROLL TO TOP -->
    <a href="#" class="scroll-top">↑</a>

</body>
</html>
